name: Build, Test and Deploy

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/six6hroun/users-app
  REMOTE_HOST: 212.192.134.135
  REMOTE_PORT: 60080
  REMOTE_USER: visvesvaraya

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kubsu
          POSTGRES_PASSWORD: kubsu
          POSTGRES_DB: kubsu
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kubsu"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[test]"
          pip install pytest pytest-asyncio httpx
      
      - name: Run tests
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+psycopg://kubsu:kubsu@localhost:5432/kubsu
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build image
        run: |
          docker build -t users-app -f docker/Dockerfile docker/
      
      - name: Push image
        run: |
          docker tag users-app ${{ env.IMAGE_NAME }}:latest
          docker tag users-app ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Deploy to server
        run: |
          ssh -p ${{ env.REMOTE_PORT }} ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} "
            echo '${{ secrets.GITHUB_TOKEN }}' | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
            podman pull ${{ env.IMAGE_NAME }}:latest
            podman stop users-container || true
            podman rm users-container || true
            podman run -d \
              --name users-container \
              -p 8118:8118 \
              --restart=always \
              -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu \
              ${{ env.IMAGE_NAME }}:latest
          "
      
      - name: Verify deployment
        run: |
          sleep 10
          curl -f -s -o /dev/null "http://${{ env.REMOTE_HOST }}:${{ env.REMOTE_PORT }}/visvesvaraya@kubsu.tyvik.ru/users/"
          if [ $? -eq 0 ]; then
            echo "✅ Application successfully deployed"
          else
            echo "❌ Application is not responding"
            exit 1
          fi
